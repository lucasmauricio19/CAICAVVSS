<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>CAICAVV Sistema</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>📋 Sistema CAICAVV - Atendimentos</h1>

<div class="form">

  <input id="nome" placeholder="Nome do paciente">
  <input id="pasta" placeholder="Nº da pasta">

  <!-- 👇 TÉCNICOS FIXOS -->
  <select id="tecnico">
    <option value="">Selecione o técnico</option>
    <option value="Josiane">Josiane</option>
    <option value="Cláudia">Cláudia</option>
    <option value="Angélica">Angélica</option>
    <option value="Cintya">Cintya</option>
  </select>

  <input id="data" type="date">
  <input id="hora" type="time">

  <button onclick="adicionar()">Adicionar Atendimento</button>

</div>

<hr>

<h2>📅 Atendimentos</h2>
<div id="lista"></div>

<!-- 🔥 FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="script.js"></script>

</body>
</html>
