<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAICAVV</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{font-family:Arial;background:#f1f5f9;margin:0}
header{background:#0f172a;color:#fff;padding:15px;text-align:center}
.container{max-width:900px;margin:auto;padding:20px}
input,button{width:100%;padding:10px;margin-top:8px;border-radius:8px;border:1px solid #ccc;box-sizing:border-box}
button{background:#2563eb;color:#fff;border:none;cursor:pointer}
button:hover{opacity:.95}
button:disabled{background:#94a3b8;cursor:not-allowed}
.card{background:#fff;padding:10px;margin-top:10px;border-radius:8px}
.menu{display:flex;gap:5px;flex-wrap:wrap}
.menu button{flex:1;background:#ddd;color:#000}
.menu .ativo{background:#2563eb;color:#fff}
.compareceu{background:green}
.faltou{background:red}
.excluir{background:#b91c1c}
.hidden{display:none!important}
.info{background:#e2e8f0;padding:10px;border-radius:8px;margin-top:10px}
</style>
</head>

<body>

<header>CAICAVV</header>

<!-- LOGIN -->
<div class="container" id="loginDiv">
  <h3>Login</h3>
  <input id="user" placeholder="Usuário" autocomplete="username">
  <input id="pass" type="password" placeholder="Senha" autocomplete="current-password">
  <button onclick="login()">Entrar</button>
</div>

<!-- APP -->
<div class="container" id="app" style="display:none">

  <div class="info" id="boasVindas"></div>

  <div class="menu" id="menu"></div>

  <div id="relatorio" class="info"></div>

  <div id="formAtendimento">
    <input id="pasta" placeholder="Nº pasta" maxlength="30">
    <input id="nome" placeholder="Nome" maxlength="120">
    <input type="date" id="data">
    <input type="time" id="hora">
    <input id="descricao" placeholder="Descrição" maxlength="250">
    <button id="btnAdicionar" onclick="add()">Adicionar</button>
  </div>

  <div id="lista"></div>

  <button onclick="logout()">Sair</button>

</div>

<script>
// 🔥 FIREBASE
const firebaseConfig = {
  apiKey: "SUA_KEY",
  authDomain: "SEU_DOMINIO",
  projectId: "SEU_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();


// 👤 USUÁRIOS
const usuarios = {
  "josiane.caicavv": { nome: "Josiane", role: "tecnico" },
  "claudia.caicavv": { nome: "Cláudia", role: "tecnico" },
  "cintya.caicavv": { nome: "Cintya", role: "tecnico" },
  "angelica.caicavv": { nome: "Angélica", role: "tecnico" },
  "recepcao.caicavv": { nome: "Recepção", role: "recepcao" },
  "adm.caicavv": { nome: "Administrativo", role: "adm" }
};

// 🔑 SENHAS
// ⚠️ Isso ainda NÃO é seguro de verdade porque está no front-end.
// É apenas a continuação do seu modelo atual.
const senhas = {
  "josiane.caicavv": "caicavv26@",
  "claudia.caicavv": "caicavv26@",
  "cintya.caicavv": "caicavv26@",
  "angelica.caicavv": "caicavv26@",
  "recepcao.caicavv": "caicavv26@",
  "adm.caicavv": "1202"
};

// 🔐 PERMISSÕES
const permissoes = {
  tecnico:  { ver: false, add: true,  del: true,  marcar: true },
  recepcao: { ver: true,  add: false, del: false, marcar: true },
  adm:      { ver: true,  add: true,  del: true,  marcar: true }
};

let tecnicoLogado = null;
let atendimentos = [];
let filtroAtual = "";

// proteção básica de texto
function escapeHTML(str){
  return String(str || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function textoSeguro(valor, max=120){
  return escapeHTML(String(valor || "").trim().slice(0, max));
}

function mostrarErro(msg){
  alert(msg);
}

function salvarSessao(login){
  sessionStorage.setItem("caicavv_user", login);
}

function lerSessao(){
  return sessionStorage.getItem("caicavv_user");
}

function limparSessao(){
  sessionStorage.removeItem("caicavv_user");
}

// LOGIN
function login(){
  let u = String(user.value || "").trim().toLowerCase();
  let p = String(pass.value || "");

  if(!u || !p){
    mostrarErro("Preencha usuário e senha.");
    return;
  }

  if(usuarios[u] && senhas[u] === p){
    tecnicoLogado = usuarios[u];

    if(tecnicoLogado.role === "tecnico"){
      filtroAtual = tecnicoLogado.nome;
    } else {
      filtroAtual = "";
    }

    salvarSessao(u);

    loginDiv.style.display = "none";
    app.style.display = "block";

    montarMenu();
    aplicarPermissoesNaTela();
    carregar();
  } else {
    mostrarErro("Login inválido.");
  }
}

// AUTOLOGIN DE SESSÃO
(function restaurarSessao(){
  const u = lerSessao();
  if(u && usuarios[u]){
    tecnicoLogado = usuarios[u];

    if(tecnicoLogado.role === "tecnico"){
      filtroAtual = tecnicoLogado.nome;
    } else {
      filtroAtual = "";
    }

    loginDiv.style.display = "none";
    app.style.display = "block";

    montarMenu();
    aplicarPermissoesNaTela();
    carregar();
  }
})();

// LOGOUT
function logout(){
  limparSessao();
  location.reload();
}

// MENU
function montarMenu(){
  let html = "";
  let role = tecnicoLogado.role;

  if(role === "recepcao" || role === "adm"){
    let tecnicos = Object.values(usuarios)
      .filter(u => u.role === "tecnico")
      .map(u => u.nome);

    tecnicos.forEach((t, i)=>{
      html += `<button ${i===0 ? 'class="ativo"' : ""} onclick="filtrar('${escapeHTML(t)}',this)">${escapeHTML(t)}</button>`;
    });

    if(tecnicos.length > 0 && !filtroAtual){
      filtroAtual = tecnicos[0];
    }
  } else {
    html = `<button class="ativo">${escapeHTML(tecnicoLogado.nome)}</button>`;
  }

  menu.innerHTML = html;
  boasVindas.innerHTML = `<b>Usuário:</b> ${escapeHTML(tecnicoLogado.nome)} | <b>Perfil:</b> ${escapeHTML(tecnicoLogado.role)}`;
}

function aplicarPermissoesNaTela(){
  const role = tecnicoLogado.role;
  const podeAdicionar = permissoes[role].add;

  formAtendimento.classList.toggle("hidden", !podeAdicionar);
  btnAdicionar.disabled = !podeAdicionar;
}

// ADICIONAR
function add(){
  if(!tecnicoLogado) return;

  if(!permissoes[tecnicoLogado.role].add){
    mostrarErro("Sem permissão para adicionar.");
    return;
  }

  let pastaValor = textoSeguro(pasta.value, 30);
  let nomeValor = textoSeguro(nome.value, 120);
  let dataValor = String(data.value || "");
  let horaValor = String(hora.value || "");
  let descricaoValor = textoSeguro(descricao.value, 250);

  if(!pastaValor || !nomeValor || !dataValor || !horaValor){
    mostrarErro("Preencha pasta, nome, data e hora.");
    return;
  }

  let tecnicoDestino = filtroAtual || tecnicoLogado.nome;

  let obj = {
    pasta: pastaValor,
    nome: nomeValor,
    tecnico: tecnicoDestino,
    data: dataValor,
    hora: horaValor,
    descricao: descricaoValor,
    status: "agendado",
    criadoPor: tecnicoLogado.nome,
    roleCriador: tecnicoLogado.role,
    criadoEm: new Date().toISOString()
  };

  db.collection("atendimentos").add(obj)
    .then(() => {
      pasta.value = "";
      nome.value = "";
      data.value = "";
      hora.value = "";
      descricao.value = "";
    })
    .catch(() => {
      mostrarErro("Erro ao adicionar atendimento.");
    });
}

// CARREGAR
function carregar(){
  db.collection("atendimentos").onSnapshot(snap=>{
    atendimentos = [];
    snap.forEach(doc=>{
      let d = doc.data();
      d.id = doc.id;
      atendimentos.push(d);
    });
    render();
  }, () => {
    mostrarErro("Erro ao carregar atendimentos do Firebase.");
  });
}

// MARCAR
function marcar(id,status){
  if(!tecnicoLogado) return;

  if(!permissoes[tecnicoLogado.role].marcar){
    mostrarErro("Sem permissão.");
    return;
  }

  if(status !== "compareceu" && status !== "faltou"){
    mostrarErro("Status inválido.");
    return;
  }

  db.collection("atendimentos").doc(id).update({
    status,
    atualizadoPor: tecnicoLogado.nome,
    atualizadoEm: new Date().toISOString()
  }).catch(() => {
    mostrarErro("Erro ao atualizar status.");
  });
}

// EXCLUIR
function excluir(id){
  if(!tecnicoLogado) return;

  if(!permissoes[tecnicoLogado.role].del){
    mostrarErro("Sem permissão.");
    return;
  }

  if(!confirm("Deseja realmente excluir este atendimento?")){
    return;
  }

  db.collection("atendimentos").doc(id).delete()
    .catch(() => {
      mostrarErro("Erro ao excluir atendimento.");
    });
}

// FILTRO
function filtrar(t,btn){
  filtroAtual = t;

  document.querySelectorAll(".menu button")
    .forEach(b=>b.classList.remove("ativo"));

  btn.classList.add("ativo");

  render();
}

// RELATÓRIO
function rel(){
  if(!filtroAtual){
    relatorio.innerHTML = "<b>Selecione um técnico.</b>";
    return;
  }

  let l = atendimentos.filter(a=>a.tecnico===filtroAtual);

  let ag = l.length;
  let ok = l.filter(a=>a.status==="compareceu").length;
  let ft = l.filter(a=>a.status==="faltou").length;

  relatorio.innerHTML = `
    <b>${escapeHTML(filtroAtual)}</b><br>
    📅 ${ag} | ✅ ${ok} | ❌ ${ft}
  `;
}

// RENDER
function render(){
  if(!tecnicoLogado) return;

  lista.innerHTML = "";
  rel();

  let role = tecnicoLogado.role;

  let dados = atendimentos.filter(a=>{
    if(role === "tecnico") return a.tecnico === tecnicoLogado.nome;
    if(role === "recepcao") return !filtroAtual || a.tecnico === filtroAtual;
    if(role === "adm") return !filtroAtual || a.tecnico === filtroAtual;
    return false;
  });

  if(dados.length === 0){
    lista.innerHTML = `<div class="card">Nenhum atendimento encontrado.</div>`;
    return;
  }

  dados.forEach(a=>{
    lista.innerHTML += `
      <div class="card">
        <p><b>Pasta:</b> ${escapeHTML(a.pasta)}</p>
        <p><b>Nome:</b> ${escapeHTML(a.nome)}</p>
        <p><b>Técnico:</b> ${escapeHTML(a.tecnico)}</p>
        <p>${escapeHTML(a.data)} ${escapeHTML(a.hora)}</p>
        <p><b>Descrição:</b> ${escapeHTML(a.descricao || "")}</p>
        <p>Status: ${escapeHTML(a.status)}</p>

        ${permissoes[role].marcar ? `
          <button class="compareceu" onclick="marcar('${a.id}','compareceu')">✔ Compareceu</button>
          <button class="faltou" onclick="marcar('${a.id}','faltou')">✖ Faltou</button>
        ` : ""}

        ${permissoes[role].del ? `
          <button class="excluir" onclick="excluir('${a.id}')">🗑 Excluir</button>
        ` : ""}
      </div>
    `;
  });
}
</script>

</body>
</html>
