<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>CAICAVV - Sistema</title>

<style>
body {
  font-family: Arial;
  background: #f1f5f9;
  margin: 0;
}

header {
  background: #0f172a;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 20px;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

input, select, button {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 8px;
  border: 1px solid #ccc;
  box-sizing: border-box;
}

button {
  background: #2563eb;
  color: white;
  border: none;
  cursor: pointer;
}

button:hover {
  background: #1d4ed8;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.card {
  background: white;
  padding: 15px;
  margin-top: 15px;
  border-radius: 10px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.top {
  display: flex;
  justify-content: space-between;
}

.numero {
  font-weight: bold;
  color: #2563eb;
}

.acoes button {
  width: auto;
  margin-left: 5px;
  background: #ef4444;
}

.presenca button {
  width: auto;
  margin-right: 5px;
}

.compareceu { background: #16a34a; }
.faltou { background: #dc2626; }

.relatorio {
  background: white;
  padding: 15px;
  margin-top: 20px;
  border-radius: 10px;
  font-weight: bold;
}

.backup { background: #16a34a; }
.restore { background: #f59e0b; }
.reset { background: #dc2626; }
</style>
</head>

<body>

<header>CAICAVV - Sistema de Atendimentos</header>

<div class="container">

<input id="pasta" placeholder="Nº da pasta">
<input id="nome" placeholder="Nome do paciente">

<select id="tecnico">
  <option value="">Selecione o técnico</option>
  <option>João</option>
  <option>Maria</option>
  <option>Carlos</option>
  <option>Ana</option>
</select>

<div class="grid">
  <input type="date" id="data">
  <input type="time" id="hora">
</div>

<input id="descricao" placeholder="Descrição do atendimento">

<button onclick="adicionar()">Adicionar Atendimento</button>

<div id="lista"></div>

<div class="relatorio" id="relatorio"></div>

<button class="reset" onclick="resetar()">Resetar Tudo</button>

</div>

<script>
let atendimentos = [];
let contador = 1;

function carregar() {
  let dados = localStorage.getItem("atendimentos");
  let cont = localStorage.getItem("contador");

  if (dados) atendimentos = JSON.parse(dados);
  if (cont) contador = parseInt(cont);
}

function salvar() {
  localStorage.setItem("atendimentos", JSON.stringify(atendimentos));
  localStorage.setItem("contador", contador);
}

function adicionar() {
  let pasta = document.getElementById("pasta").value;
  let nome = document.getElementById("nome").value;
  let tecnico = document.getElementById("tecnico").value;
  let data = document.getElementById("data").value;
  let hora = document.getElementById("hora").value;
  let descricao = document.getElementById("descricao").value;

  if (!pasta || !nome || !tecnico || !data || !hora || !descricao) {
    alert("Preencha todos os campos!");
    return;
  }

  atendimentos.push({
    numero: contador,
    pasta,
    nome,
    tecnico,
    data,
    hora,
    descricao,
    status: "agendado"
  });

  contador++;
  salvar();
  render();

  document.querySelectorAll("input").forEach(i => i.value = "");
  document.getElementById("tecnico").value = "";
}

function marcarStatus(i, status) {
  atendimentos[i].status = status;
  salvar();
  render();
}

function excluir(i) {
  atendimentos.splice(i, 1);
  salvar();
  render();
}

function render() {
  let lista = document.getElementById("lista");
  let relatorio = document.getElementById("relatorio");

  lista.innerHTML = "";

  let realizados = 0;
  let agendados = atendimentos.length;

  let mesAtual = new Date().getMonth();
  let anoAtual = new Date().getFullYear();

  atendimentos.forEach((a, i) => {

    let dataAt = new Date(a.data);

    if (dataAt.getMonth() === mesAtual && dataAt.getFullYear() === anoAtual) {
      if (a.status === "compareceu") realizados++;
    }

    lista.innerHTML += `
      <div class="card">
        <div class="top">
          <span class="numero">#${a.numero}</span>
          <div class="acoes">
            <button onclick="excluir(${i})">Excluir</button>
          </div>
        </div>

        <p><b>Pasta:</b> ${a.pasta}</p>
        <p><b>Nome:</b> ${a.nome}</p>
        <p><b>Técnico:</b> ${a.tecnico}</p>
        <p><b>Data:</b> ${a.data}</p>
        <p><b>Hora:</b> ${a.hora}</p>
        <p><b>Descrição:</b> ${a.descricao}</p>
        <p><b>Status:</b> ${a.status}</p>

        <div class="presenca">
          <button class="compareceu" onclick="marcarStatus(${i}, 'compareceu')">Compareceu</button>
          <button class="faltou" onclick="marcarStatus(${i}, 'faltou')">Não compareceu</button>
        </div>
      </div>
    `;
  });

  relatorio.innerHTML = `
    📊 Relatório do mês:<br>
    Total agendados: ${agendados}<br>
    Compareceram: ${realizados}
  `;
}

function resetar() {
  if (confirm("Apagar tudo?")) {
    atendimentos = [];
    contador = 1;
    localStorage.clear();
    render();
  }
}

window.addEventListener("beforeunload", salvar);

carregar();
render();
</script>

</body>
</html>
