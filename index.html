<style>
body{font-family:Arial;background:#f1f5f9;margin:0}
header{background:#0f172a;color:#fff;padding:15px;text-align:center}
.container{max-width:900px;margin:auto;padding:20px}
input,button,select{width:100%;padding:10px;margin-top:8px;border-radius:8px;border:1px solid #ccc;box-sizing:border-box}
button{background:#2563eb;color:#fff;border:none;cursor:pointer}
button:hover{opacity:.95}
button:disabled{background:#94a3b8;cursor:not-allowed}
.card{background:#fff;padding:10px;margin-top:10px;border-radius:8px}
.card.realizado{filter:grayscale(1);opacity:.82;background:#f8fafc;border:1px solid #cbd5e1}
.selo-realizado{display:inline-block;margin-top:6px;padding:4px 8px;border-radius:999px;background:#0f172a;color:#fff;font-size:12px;font-weight:700;letter-spacing:.3px}
.menu{display:flex;gap:5px;flex-wrap:wrap}
.menu button{flex:1;background:#ddd;color:#000}
.menu .ativo{background:#2563eb;color:#fff}
.compareceu{background:green}
.faltou{background:red}
.excluir{background:#b91c1c}
.hidden{display:none!important}
.info{background:#e2e8f0;padding:10px;border-radius:8px;margin-top:10px}
.aviso{font-size:13px;color:#334155;margin-top:6px}
.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);background:#0f172a;color:#fff;padding:12px 18px;border-radius:10px;box-shadow:0 10px 30px rgba(0,0,0,.18);z-index:9999;display:none;font-weight:700}
.toast.show{display:block}
.toast.erro{background:#b91c1c}
.toast.sucesso{background:#166534}
.modal-fundo{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;align-items:center;justify-content:center;z-index:10000;padding:20px}
.modal-fundo.show{display:flex}
.modal-box{background:#fff;color:#0f172a;max-width:420px;width:100%;border-radius:14px;padding:20px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-box h3{margin:0 0 8px 0;font-size:20px}
.modal-box p{margin:0 0 16px 0;line-height:1.4}
.modal-acoes{display:flex;gap:10px}
.modal-acoes button{margin-top:0}
.modal-cancelar{background:#64748b}
.modal-confirmar{background:#b91c1c}
.linha-pasta{display:flex;gap:8px;align-items:flex-end}
.linha-pasta input{flex:1}
.linha-pasta button{width:220px;min-width:220px;margin-top:0}
input:disabled{background:#e2e8f0;color:#334155;opacity:1}
@media (max-width:700px){.linha-pasta{flex-direction:column}.linha-pasta button{width:100%;min-width:0;margin-top:8px}}
</style>
</head>

<body>

<header>CAICAVV</header>
<div id="toast" class="toast"></div>

<div id="modalExcluir" class="modal-fundo">
  <div class="modal-box">
    <h3>Excluir agendamento</h3>
    <p>Deseja realmente excluir esse agendamento?</p>
    <div class="modal-acoes">
      <button type="button" class="modal-cancelar" onclick="fecharModalExcluir()">Cancelar</button>
      <button type="button" class="modal-confirmar" onclick="confirmarExclusao()">Excluir</button>
    </div>
  </div>
</div>

<div class="container" id="loginDiv">
  <h3>Login</h3>
  <input id="user" placeholder="Usuário" autocomplete="username">
  <input id="pass" type="password" placeholder="Senha" autocomplete="current-password">
  <button onclick="login()">Entrar</button>
</div>

<div class="container" id="app" style="display:none">
  <div class="info" id="boasVindas"></div>
  <div class="menu" id="menu"></div>
  <div id="relatorio" class="info"></div>

  <div id="formAtendimento">
    <div class="linha-pasta">
      <input id="pasta" placeholder="Nº pasta" maxlength="30" oninput="limparConfirmacaoPasta()" onkeydown="if(event.key==='Enter'){event.preventDefault();confirmarPasta();}">
      <button type="button" id="btnConfirmarPasta" onclick="confirmarPasta()">Confirmar pasta</button>
    </div>
    <input id="nome" placeholder="Nome preenchido automaticamente" maxlength="220" readonly>
    <div id="avisoCadastro" class="aviso"></div>

    <input type="date" id="data">
    <select id="hora"></select>
    <input id="descricao" placeholder="Descrição" maxlength="250">
    <button id="btnAdicionar" onclick="add()">Adicionar</button>
  </div>

  <div id="lista"></div>

  <button onclick="logout()">Sair</button>
</div>

async function salvarAtendimentosFirebase(){
  try{
    await DOC_ATENDIMENTOS.set({
      itens: atendimentos,
      atualizadoEm: new Date().toISOString()
    }, { merge: true });
  }catch(e){
    console.error(e);
    mostrarErro("Erro ao salvar no Firebase.");
    throw e;
  }
}

async function carregarAtendimentosFirebase(){
  try{
    const snap = await DOC_ATENDIMENTOS.get();
    if(snap.exists){
      const dados = snap.data() || {};
      atendimentos = Array.isArray(dados.itens) ? dados.itens : [];
    } else {
      atendimentos = [];
      await DOC_ATENDIMENTOS.set({ itens: [], criadoEm: new Date().toISOString() }, { merge: true });
    }
  }catch(e){
    console.error(e);
    atendimentos = [];
    mostrarErro("Não foi possível carregar os dados do Firebase.");
  }
}

function escapeHTML(str){
  return String(str || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function textoSeguro(valor, max=120){
  return escapeHTML(String(valor || "").trim().slice(0, max));
}

function normalizarPasta(valor){
  return String(valor || "").replace(/\D/g, "");
}

function limparConfirmacaoPasta(){
  pasta.value = normalizarPasta(pasta.value);
  pastaConfirmada = false;
  nome.value = "";
  avisoCadastro.textContent = "Clique em Confirmar pasta para buscar o nome.";
}

function confirmarPasta(){
  const pastaDigitada = normalizarPasta(pasta.value);
  pasta.value = pastaDigitada;

  if(!pastaDigitada){
    pastaConfirmada = false;
    nome.value = "";
    avisoCadastro.textContent = "Digite o número da pasta e clique em Confirmar pasta.";
    return;
  }

  if(typeof cadastros === "undefined"){ 
    pastaConfirmada = false;
    nome.value = "";
    avisoCadastro.textContent = "Base de cadastros não carregada.";
    return;
  }

  const encontrado = cadastros[pastaDigitada];

  if(!encontrado){
    pastaConfirmada = false;
    nome.value = "";
    avisoCadastro.textContent = "Pasta não encontrada no cadastro importado.";
    return;
  }

  pastaConfirmada = true;

  if(Array.isArray(encontrado) && encontrado.length > 1){
    nome.value = encontrado.join(" | ");
    avisoCadastro.textContent = "Cadastro encontrado. Esta pasta possui mais de um nome.";
    return;
  }

  nome.value = Array.isArray(encontrado) ? encontrado[0] : encontrado;
  avisoCadastro.textContent = "Cadastro encontrado com sucesso.";
}

        login();

    });
  });
}

  let u = String(user.value || "").trim().toLowerCase();
  let p = String(pass.value || "");

  if(!u || !p){
    mostrarErro("Preencha usuário e senha.");
    return;
  }

  if(usuarios[u] && senhas[u] === p){
    tecnicoLogado = usuarios[u];

    if(tecnicoLogado.role === "tecnico"){
      filtroAtual = tecnicoLogado.nome;
    } else {
      filtroAtual = "";
    }

    salvarSessao(u);
    loginDiv.style.display = "none";
    app.style.display = "block";

    montarMenu();
    aplicarPermissoesNaTela();
    await carregar();
  } else {
    mostrarErro("Senha ou usuário incorretos");
  }
}

(async function restaurarSessao(){
  const u = lerSessao();
  if(u && usuarios[u]){
    tecnicoLogado = usuarios[u];

    if(tecnicoLogado.role === "tecnico"){
      filtroAtual = tecnicoLogado.nome;
    } else {
      filtroAtual = "";
    }

    loginDiv.style.display = "none";
    app.style.display = "block";

    montarMenu();
    aplicarPermissoesNaTela();
    await carregar();
  }
})();

function logout(){
  limparSessao();
  location.reload();
}

function montarMenu(){
  let html = "";
  let role = tecnicoLogado.role;

  if(role === "recepcao" || role === "adm"){
    let tecnicos = Object.values(usuarios)
      .filter(u => u.role === "tecnico")
      .map(u => u.nome);

    tecnicos.forEach((t, i)=>{
      html += `<button ${i===0 ? 'class="ativo"' : ""} onclick="filtrar('${escapeHTML(t)}',this)">${escapeHTML(t)}</button>`;
    });

    if(tecnicos.length > 0 && !filtroAtual){
      filtroAtual = tecnicos[0];
    }
  } else {
    html = `<button class="ativo">${escapeHTML(tecnicoLogado.nome)}</button>`;
  }

  menu.innerHTML = html;
  boasVindas.innerHTML = `<b>Usuário:</b> ${escapeHTML(tecnicoLogado.nome)} | <b>Perfil:</b> ${escapeHTML(tecnicoLogado.role)}`;
}

function aplicarPermissoesNaTela(){
  const role = tecnicoLogado.role;
  const podeAdicionar = permissoes[role].add;
  formAtendimento.classList.toggle("hidden", !podeAdicionar);
  btnAdicionar.disabled = !podeAdicionar;
}

async function add(){
  if(!tecnicoLogado) return;

  if(!permissoes[tecnicoLogado.role].add){
    mostrarErro("Sem permissão para adicionar.");
    return;
  }

  let pastaValor = normalizarPasta(pasta.value);
  let nomeValor = textoSeguro(nome.value, 220);
  let dataValor = String(data.value || "");
  let horaValor = String(hora.value || "");
  let descricaoValor = textoSeguro(descricao.value, 250);

  if(!pastaValor || !dataValor || !horaValor){
    mostrarErro("Preencha pasta, data e horário.");
    return;
  }

  const cadastroEncontrado = cadastros[pastaValor];
  if(!pastaConfirmada || !cadastroEncontrado || !nomeValor){
    mostrarErro("Confirme a pasta antes de adicionar o agendamento.");
    return;
  }

  let tecnicoDestino = filtroAtual || tecnicoLogado.nome;

  if(temConflitoAgendamento(tecnicoDestino, dataValor, horaValor)){
    mostrarToast("Esse agendamento já foi feito", "erro");
    return;
  }

  let obj = {
    id: "id_" + Date.now() + "_" + Math.random().toString(36).slice(2, 9),
    pasta: pastaValor,
    nome: nomeValor,
    tecnico: tecnicoDestino,
    data: dataValor,
    hora: horaValor,
    descricao: descricaoValor,
    status: "agendado",
    criadoPor: tecnicoLogado.nome,
    roleCriador: tecnicoLogado.role,
    criadoEm: new Date().toISOString()
  };

  btnAdicionar.disabled = true;

  atendimentos.unshift(obj);
  await salvarAtendimentosFirebase();

  pasta.value = "";
  nome.value = "";
  data.value = "";
  hora.value = horariosAtendimento[0] || "";
  descricao.value = "";
  avisoCadastro.textContent = "Clique em Confirmar pasta para buscar o nome.";
  pastaConfirmada = false;

  render();
  mostrarToast("Agendamento adicionado com sucesso.", "sucesso");
  btnAdicionar.disabled = false;
}

async function carregar(){
  await carregarAtendimentosFirebase();
  render();
}

async function marcar(id,status){
  if(!tecnicoLogado) return;

  if(!permissoes[tecnicoLogado.role].marcar){
    mostrarErro("Sem permissão.");
    return;
  }

  if(status !== "compareceu" && status !== "faltou"){
    mostrarErro("Status inválido.");
    return;
  }

  const item = atendimentos.find(a => a.id === id);
  if(!item){
    mostrarErro("Atendimento não encontrado.");
    return;
  }

  item.status = status;
  item.atualizadoPor = tecnicoLogado.nome;
  item.atualizadoEm = new Date().toISOString();
  await salvarAtendimentosFirebase();
  render();
}

function excluir(id){
  if(!tecnicoLogado) return;

  if(!permissoes[tecnicoLogado.role].del){
    mostrarErro("Sem permissão.");
    return;
  }

  abrirModalExcluir(id);
}

function abrirModalExcluir(id){
  agendamentoPendenteExclusao = id;
  modalExcluir.classList.add("show");
}

function fecharModalExcluir(){
  agendamentoPendenteExclusao = null;
  modalExcluir.classList.remove("show");
}

async function confirmarExclusao(){
  if(!agendamentoPendenteExclusao) return;

  atendimentos = atendimentos.filter(a => a.id !== agendamentoPendenteExclusao);
  await salvarAtendimentosFirebase();
  fecharModalExcluir();
  render();
  mostrarToast("Agendamento excluído com sucesso.", "sucesso");
}

function filtrar(t,btn){
  filtroAtual = t;

  document.querySelectorAll(".menu button")
    .forEach(b=>b.classList.remove("ativo"));

  btn.classList.add("ativo");
  render();
}

function rel(){
  if(!filtroAtual){
    relatorio.innerHTML = "<b>Selecione um técnico.</b>";
    return;
  }

  let l = atendimentos.filter(a=>a.tecnico===filtroAtual);
  let ag = l.length;
  let ok = l.filter(a=>a.status==="compareceu").length;
  let ft = l.filter(a=>a.status==="faltou").length;

  relatorio.innerHTML = `
    <b>${escapeHTML(filtroAtual)}</b><br>
    📅 ${ag} | ✅ ${ok} | ❌ ${ft}
  `;
}

function getDataHoraAtendimento(item){
  const dataParte = item.data || "9999-12-31";
  const horaParte = item.hora || "23:59";
  return `${dataParte}T${horaParte}`;
}

function render(){
  if(!tecnicoLogado) return;

  lista.innerHTML = "";
  rel();

  let role = tecnicoLogado.role;

  let dados = atendimentos.filter(a=>{
    if(role === "tecnico") return a.tecnico === tecnicoLogado.nome;
    if(role === "recepcao") return !filtroAtual || a.tecnico === filtroAtual;
    if(role === "adm") return !filtroAtual || a.tecnico === filtroAtual;
    return false;
  });

  dados.sort((a,b) => {
    const aRealizado = a.status === "compareceu" || a.status === "faltou";
    const bRealizado = b.status === "compareceu" || b.status === "faltou";

    if(aRealizado !== bRealizado){
      return aRealizado ? 1 : -1;
    }

    return getDataHoraAtendimento(a).localeCompare(getDataHoraAtendimento(b));
  });

  if(dados.length === 0){
    lista.innerHTML = `<div class="card">Nenhum atendimento encontrado.</div>`;
    return;
  }

  dados.forEach(a=>{
    const realizado = a.status === "compareceu" || a.status === "faltou";
    const statusLabel = a.status === "compareceu" ? "Compareceu" : a.status === "faltou" ? "Faltou" : "Agendado";

    lista.innerHTML += `
      <div class="card ${realizado ? 'realizado' : ''}">
        <p><b>Pasta:</b> ${escapeHTML(a.pasta)}</p>
        <p><b>Nome:</b> ${escapeHTML(a.nome)}</p>
        <p><b>Técnico:</b> ${escapeHTML(a.tecnico)}</p>
        <p>${escapeHTML(a.data)} ${escapeHTML(a.hora)}</p>
        <p><b>Descrição:</b> ${escapeHTML(a.descricao || "")}</p>
        <p><b>Status:</b> ${escapeHTML(statusLabel)}</p>
        ${realizado ? `<span class="selo-realizado">JÁ REALIZADO</span>` : ""}

        ${permissoes[role].marcar && !realizado ? `
          <button class="compareceu" onclick="marcar('${a.id}','compareceu')">✔ Compareceu</button>
          <button class="faltou" onclick="marcar('${a.id}','faltou')">✖ Faltou</button>
        ` : ""}

        ${permissoes[role].del ? `
          <button class="excluir" onclick="excluir('${a.id}')">🗑 Excluir</button>
        ` : ""}
      </div>
    `;
  });
}
</script>
