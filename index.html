<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAICAVV</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{font-family:Arial;background:#f1f5f9;margin:0}
header{background:#0f172a;color:#fff;padding:15px;text-align:center}
.container{max-width:900px;margin:auto;padding:20px}
input,button,select{width:100%;padding:10px;margin-top:8px;border-radius:8px;border:1px solid #ccc}
button{background:#2563eb;color:#fff;border:none;cursor:pointer}
.card{background:#fff;padding:10px;margin-top:10px;border-radius:8px}
.menu{display:flex;gap:5px}
.menu button{flex:1;background:#ddd;color:#000}
.menu .ativo{background:#2563eb;color:#fff}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#b91c1c;color:#fff;padding:10px 20px;border-radius:8px;display:none;z-index:999}
</style>
</head>

<body>

<header>CAICAVV</header>
<div id="toast" class="toast"></div>

<div class="container" id="loginDiv">
<h3>Login</h3>
<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
</div>

<div class="container" id="app" style="display:none">

<div class="menu" id="menu"></div>
<div id="relatorio"></div>

<input id="pasta" placeholder="Nº pasta">
<button onclick="confirmarPasta()">Confirmar pasta</button>

<input id="nome" placeholder="Nome automático" readonly>

<input type="date" id="data">
<select id="hora"></select>

<input id="descricao" placeholder="Descrição">
<button onclick="add()">Adicionar</button>

<div id="lista"></div>

<button onclick="logout()">Sair</button>

</div>

<script>

// 🔥 COLE SEU FIREBASE AQUI
const firebaseConfig = {
  apiKey: "SUA_KEY",
  authDomain: "SEU_DOMINIO",
  projectId: "SEU_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();


// 👤 USUÁRIOS
const usuarios = {
  "josiane.caicavv": { nome: "Josiane", role: "tecnico" },
  "recepcao.caicavv": { nome: "Recepção", role: "recepcao" },
  "adm.caicavv": { nome: "ADM", role: "adm" }
};

const senhas = {
  "josiane.caicavv": "caicavv26@",
  "recepcao.caicavv": "caicavv26@",
  "adm.caicavv": "1202"
};

let tecnicoLogado = null;
let atendimentos = [];
let filtroAtual = "";

// 🔔 MENSAGEM TOPO
function msg(texto){
  toast.innerText = texto;
  toast.style.display = "block";
  setTimeout(()=>toast.style.display="none",3000);
}

// LOGIN
function login(){
  let u = user.value;
  let p = pass.value;

  if(usuarios[u] && senhas[u] === p){
    tecnicoLogado = usuarios[u];
    filtroAtual = tecnicoLogado.nome;

    loginDiv.style.display = "none";
    app.style.display = "block";

    montarMenu();
    carregar();

  }else{
    msg("Senha ou usuário incorretos");
  }
}

// LOGOUT
function logout(){ location.reload(); }

// MENU
function montarMenu(){
  menu.innerHTML = `<button class="ativo">${tecnicoLogado.nome}</button>`;
}

// HORÁRIOS
const horarios = [
"08:00","08:30","09:00","09:30","10:00","10:30",
"11:00","11:30","13:00","13:30","14:00","14:30",
"15:00","15:30","16:00","16:30"
];

hora.innerHTML = horarios.map(h=>`<option>${h}</option>`).join("");

// 🔎 BASE (EXEMPLO — você já tem a completa)
const cadastros = {
  "1":["Exemplo Nome"]
};

// CONFIRMAR PASTA
function confirmarPasta(){
  let p = pasta.value.trim();

  if(!cadastros[p]){
    msg("Pasta não encontrada");
    nome.value="";
    return;
  }

  nome.value = cadastros[p].join(", ");
}

// TEMPO REAL
function carregar(){
  db.collection("atendimentos").onSnapshot(snap=>{
    atendimentos = [];
    snap.forEach(doc=>{
      let d = doc.data();
      d.id = doc.id;
      atendimentos.push(d);
    });
    render();
  });
}

// ADD
function add(){

  if(!nome.value){
    msg("Confirme a pasta primeiro");
    return;
  }

  let conflito = atendimentos.find(a=>
    a.tecnico===filtroAtual &&
    a.data===data.value &&
    a.hora===hora.value
  );

  if(conflito){
    msg("Esse agendamento já foi feito");
    return;
  }

  db.collection("atendimentos").add({
    pasta:pasta.value,
    nome:nome.value,
    tecnico:filtroAtual,
    data:data.value,
    hora:hora.value,
    descricao:descricao.value,
    status:"agendado"
  });

  pasta.value="";
  nome.value="";
  descricao.value="";
}

// RENDER
function render(){
  lista.innerHTML="";
  atendimentos.forEach(a=>{
    lista.innerHTML+=`
    <div class="card">
      <b>${a.nome}</b><br>
      ${a.data} ${a.hora}
    </div>`;
  });
}

</script>

</body>
</html>
