<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>CAICAVV - Sistema</title>

<style>
body {
  font-family: Arial;
  background: #f1f5f9;
  margin: 0;
}

header {
  background: #0f172a;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 20px;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

input, select, button {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  background: #2563eb;
  color: white;
  border: none;
  cursor: pointer;
}

button:hover {
  background: #1d4ed8;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.card {
  background: white;
  padding: 15px;
  margin-top: 15px;
  border-radius: 10px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.top {
  display: flex;
  justify-content: space-between;
}

.numero {
  font-weight: bold;
  color: #2563eb;
}

.acoes button {
  width: auto;
  margin-left: 5px;
  background: #ef4444;
}

.backup { background: #16a34a; }
.restore { background: #f59e0b; }
.reset { background: #dc2626; }
</style>
</head>

<body>

<header>CAICAVV - Sistema de Atendimentos</header>

<div class="container">

<input id="pasta" placeholder="Nº da pasta">
<input id="nome" placeholder="Nome do paciente">

<select id="tecnico">
  <option value="">Selecione o técnico</option>
  <option value="João">João</option>
  <option value="Maria">Maria</option>
  <option value="Carlos">Carlos</option>
  <option value="Ana">Ana</option>
</select>

<div class="grid">
  <input type="date" id="data">
  <input type="time" id="hora">
</div>

<input id="descricao" placeholder="Descrição do atendimento">

<button onclick="adicionar()">Adicionar Atendimento</button>

<div class="grid">
  <button class="backup" onclick="baixarBackup()">Backup</button>
  <button class="restore" onclick="document.getElementById('fileInput').click()">Restaurar</button>
</div>

<input type="file" id="fileInput" style="display:none" onchange="restaurarBackup(event)">

<div id="lista"></div>

<button class="reset" onclick="resetar()">Resetar Tudo</button>

</div>

<script>
let atendimentos = [];
let contador = 1;

// 🔒 CARREGAR
function carregar() {
  let dados = localStorage.getItem("atendimentos");
  let cont = localStorage.getItem("contador");

  if (dados) atendimentos = JSON.parse(dados);
  if (cont) contador = parseInt(cont);
}

// 💾 SALVAR
function salvar() {
  localStorage.setItem("atendimentos", JSON.stringify(atendimentos));
  localStorage.setItem("contador", contador);
}

// ➕ ADICIONAR
function adicionar() {
  let pasta = document.getElementById("pasta").value;
  let nome = document.getElementById("nome").value;
  let tecnico = document.getElementById("tecnico").value;
  let data = document.getElementById("data").value;
  let hora = document.getElementById("hora").value;
  let descricao = document.getElementById("descricao").value;

  if (!pasta || !nome || !tecnico || !data || !hora || !descricao) {
    alert("Preencha todos os campos!");
    return;
  }

  atendimentos.push({
    numero: contador,
    pasta,
    nome,
    tecnico,
    data,
    hora,
    descricao
  });

  contador++;
  salvar();
  render();

  document.querySelectorAll("input").forEach(i => i.value = "");
  document.getElementById("tecnico").value = "";
}

// ❌ EXCLUIR
function excluir(i) {
  atendimentos.splice(i, 1);
  salvar();
  render();
}

// 🎨 RENDER
function render() {
  let lista = document.getElementById("lista");
  lista.innerHTML = "";

  atendimentos.forEach((a, i) => {
    lista.innerHTML += `
      <div class="card">
        <div class="top">
          <span class="numero">#${a.numero}</span>
          <div class="acoes">
            <button onclick="excluir(${i})">Excluir</button>
          </div>
        </div>
        <p><b>Pasta:</b> ${a.pasta}</p>
        <p><b>Nome:</b> ${a.nome}</p>
        <p><b>Técnico:</b> ${a.tecnico}</p>
        <p><b>Data:</b> ${a.data}</p>
        <p><b>Hora:</b> ${a.hora}</p>
        <p><b>Descrição:</b> ${a.descricao}</p>
      </div>
    `;
  });
}

// 📁 BACKUP
function baixarBackup() {
  let blob = new Blob([JSON.stringify({atendimentos, contador})], {type: "application/json"});
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "backup.json";
  a.click();
}

// 📥 RESTAURAR
function restaurarBackup(event) {
  let file = event.target.files[0];
  let reader = new FileReader();

  reader.onload = function(e) {
    let dados = JSON.parse(e.target.result);
    atendimentos = dados.atendimentos || [];
    contador = dados.contador || 1;

    salvar();
    render();
  };

  reader.readAsText(file);
}

// 🔄 RESET
function resetar() {
  if (confirm("Apagar tudo?")) {
    atendimentos = [];
    contador = 1;
    localStorage.clear();
    render();
  }
}

// 🔐 PROTEÇÃO
window.addEventListener("beforeunload", salvar);

// 🚀 INICIAR
carregar();
render();
</script>

</body>
</html>
