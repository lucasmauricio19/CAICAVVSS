<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>CAICAVV - Atendimentos</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      margin: 0;
    }

    header {
      background: #1e293b;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
    }

    .container {
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }

    input, button {
      padding: 10px;
      margin: 5px 0;
      width: 100%;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    .card {
      background: white;
      padding: 15px;
      margin-top: 10px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .numero {
      font-weight: bold;
      color: #2563eb;
    }

    .acoes button {
      width: auto;
      margin-left: 5px;
      background: #ef4444;
    }

    .reset {
      background: #dc2626;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<header>
  Sistema de Atendimentos - CAICAVV
</header>

<div class="container">

  <input id="nome" placeholder="Nome do paciente">
  <input id="descricao" placeholder="Descrição do atendimento">

  <button onclick="adicionarAtendimento()">Adicionar Atendimento</button>

  <div id="lista"></div>

  <button class="reset" onclick="resetarTudo()">Resetar Tudo</button>

</div>

<script>
let atendimentos = [];
let contador = 1;

// 🔒 CARREGAR
function carregarAtendimentos() {
  let dados = localStorage.getItem("atendimentos");
  let cont = localStorage.getItem("contador");

  if (dados) {
    atendimentos = JSON.parse(dados);
  }

  if (cont) {
    contador = parseInt(cont);
  }
}

// 💾 SALVAR
function salvarAtendimentos() {
  localStorage.setItem("atendimentos", JSON.stringify(atendimentos));
  localStorage.setItem("contador", contador);
}

// ➕ ADICIONAR
function adicionarAtendimento() {
  let nome = document.getElementById("nome").value;
  let descricao = document.getElementById("descricao").value;

  if (!nome || !descricao) {
    alert("Preencha todos os campos!");
    return;
  }

  let novo = {
    numero: contador,
    nome: nome,
    descricao: descricao
  };

  atendimentos.push(novo);
  contador++;

  salvarAtendimentos();
  renderizar();

  document.getElementById("nome").value = "";
  document.getElementById("descricao").value = "";
}

// ❌ EXCLUIR
function excluir(index) {
  atendimentos.splice(index, 1);
  salvarAtendimentos();
  renderizar();
}

// 🎨 RENDERIZAR
function renderizar() {
  let lista = document.getElementById("lista");
  lista.innerHTML = "";

  atendimentos.forEach((a, i) => {
    lista.innerHTML += `
      <div class="card">
        <div class="top">
          <span class="numero">#${a.numero}</span>
          <div class="acoes">
            <button onclick="excluir(${i})">Excluir</button>
          </div>
        </div>
        <p><strong>Nome:</strong> ${a.nome}</p>
        <p><strong>Descrição:</strong> ${a.descricao}</p>
      </div>
    `;
  });
}

// 🔄 RESET
function resetarTudo() {
  let confirmar = confirm("Tem certeza que deseja apagar tudo?");
  
  if (confirmar) {
    atendimentos = [];
    contador = 1;
    localStorage.clear();
    renderizar();
  }
}

// 🔐 PROTEÇÃO EXTRA
window.addEventListener("beforeunload", function () {
  salvarAtendimentos();
});

// 🚀 INICIAR
carregarAtendimentos();
renderizar();
</script>

</body>
</html>
